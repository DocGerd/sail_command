name: Chore
description: Tooling, dependencies, CI/CD, docs, or refactor / maintenance work.
title: "[chore]: "
labels:
  - "type: chore"
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs doing, and why?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which kind of maintenance is this?
      options:
        - tooling
        - deps
        - ci
        - docs
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / acceptance criteria
      description: Anything a contributor or agent needs to complete this cleanly.
    validations:
      required: false
