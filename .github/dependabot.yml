version: 2
updates:
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      app-minor-patch:
        applies-to: version-updates
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      # Deliberate exact pin — TS minors routinely break strict builds; bump manually.
      - dependency-name: typescript
      # Majors reshape the seeded fast-check property suite / test infra — manual only.
      - dependency-name: fast-check
        update-types: [version-update:semver-major]
      - dependency-name: vitest
        update-types: [version-update:semver-major]
      - dependency-name: '@vitest/*'
        update-types: [version-update:semver-major]
      - dependency-name: '@playwright/test'
        update-types: [version-update:semver-major]
      # Exact-pinned runtime stack — majors are a deliberate migration, not a bot PR.
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: 'workbox-*'
        update-types: [version-update:semver-major]
  - package-ecosystem: npm
    directory: /pipeline
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      pipeline-npm-minor-patch:
        applies-to: version-updates
        patterns: ['*']
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /pipeline
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      pipeline-pip-minor-patch:
        applies-to: version-updates
        patterns: ['*']
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /.github/workflows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      verify-mask-pip-minor-patch:
        applies-to: version-updates
        patterns: ['*']
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    groups:
      actions-all:
        applies-to: version-updates
        patterns: ['*']
        update-types: [minor, patch]
